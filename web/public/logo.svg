<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="strategy-referee">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0b1a14"/>
      <stop offset="60%" stop-color="#06100c"/>
      <stop offset="100%" stop-color="#020807"/>
    </radialGradient>
    <linearGradient id="phos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5df2b3"/>
      <stop offset="100%" stop-color="#16c98a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="#000000" opacity="0.18"/>
    </pattern>
    <clipPath id="tile"><rect x="16" y="16" width="480" height="480" rx="112"/></clipPath>
  </defs>

  <!-- CRT tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)" stroke="#1f7d5c" stroke-opacity="0.5" stroke-width="3"/>

  <g clip-path="url(#tile)">
    <!-- referee ring -->
    <circle cx="256" cy="256" r="168" fill="none" stroke="#2be39a" stroke-opacity="0.28" stroke-width="10"/>

    <g filter="url(#glow)">
      <!-- candlestick: the chart under review -->
      <line x1="232" y1="118" x2="232" y2="394" stroke="url(#phos)" stroke-width="10" stroke-linecap="round"/>
      <rect x="206" y="176" width="52" height="170" rx="12" fill="url(#phos)"/>

      <!-- verdict tick (PASS) -->
      <polyline points="276,228 312,266 372,176" fill="none" stroke="#7dffc6" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- scanlines + soft vignette for the cathode look -->
    <rect x="16" y="16" width="480" height="480" fill="url(#scan)"/>
    <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#000000" stroke-opacity="0.55" stroke-width="40"/>
  </g>
</svg>
