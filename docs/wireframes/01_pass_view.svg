<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1400" viewBox="0 0 1440 1400" font-family="Inter, system-ui, sans-serif">

  <g id="Background">
    <rect x="0" y="0" width="1440" height="1400" fill="#ffffff"/>
  </g>

  <g id="Header">
    <rect x="0" y="0" width="1440" height="64" fill="#ffffff"/>
    <line x1="0" y1="64" x2="1440" y2="64" stroke="#e5e7eb" stroke-width="1"/>
    <text x="24" y="28" font-size="18" font-weight="700" fill="#111827">strategy-referee</text>
    <text x="24" y="48" font-size="12" fill="#6b7280">Anti-hype crypto strategy evaluator — built for BNB HACK</text>
    <g id="NavButtons">
      <text x="1240" y="40" font-size="13" fill="#6b7280">About</text>
      <text x="1308" y="40" font-size="13" fill="#6b7280">GitHub</text>
      <text x="1380" y="40" font-size="13" fill="#6b7280">Spec ↗</text>
    </g>
  </g>

  <g id="ModeBar">
    <rect x="0" y="64" width="1440" height="64" fill="#f9fafb"/>
    <line x1="0" y1="128" x2="1440" y2="128" stroke="#e5e7eb" stroke-width="1"/>
    <text x="24" y="102" font-size="13" font-weight="600" fill="#111827">Mode</text>
    <rect x="76" y="84" width="130" height="32" rx="6" fill="#111827"/>
    <text x="141" y="105" font-size="13" font-weight="500" fill="#ffffff" text-anchor="middle">Single token</text>
    <rect x="214" y="84" width="100" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="264" y="105" font-size="13" font-weight="500" fill="#6b7280" text-anchor="middle">Watchlist</text>
    <text x="370" y="102" font-size="13" font-weight="600" fill="#111827">As of</text>
    <rect x="424" y="84" width="160" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="438" y="105" font-size="13" fill="#111827">2025-09-25</text>
    <text x="572" y="105" font-size="13" fill="#6b7280">▼</text>
  </g>

  <g id="InputSection">
    <text x="24" y="170" font-size="13" font-weight="600" fill="#111827">Token</text>
    <rect x="76" y="152" width="320" height="40" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="92" y="178" font-size="14" fill="#111827">ETH</text>
    <rect x="412" y="152" width="120" height="40" rx="6" fill="#111827"/>
    <text x="472" y="178" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Evaluate</text>
    <text x="24" y="232" font-size="12" fill="#6b7280">Or try a known historical PASS:</text>
    <rect x="240" y="216" width="170" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="325" y="234" font-size="12" fill="#111827" text-anchor="middle">ETH · 2025-09-25</text>
    <rect x="424" y="216" width="170" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="509" y="234" font-size="12" fill="#111827" text-anchor="middle">LINK · 2025-09-25</text>
    <rect x="608" y="216" width="170" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="693" y="234" font-size="12" fill="#111827" text-anchor="middle">SOL · 2025-09-25</text>
  </g>

  <g id="VerdictCard">
    <rect x="24" y="280" width="1392" height="980" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

    <g id="VerdictHeader">
      <rect x="48" y="312" width="72" height="28" rx="14" fill="#10b981"/>
      <text x="84" y="330" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">PASS</text>
      <text x="136" y="334" font-size="22" font-weight="700" fill="#111827">ETH</text>
      <text x="188" y="334" font-size="14" fill="#6b7280">as of 2025-09-25</text>
      <line x1="48" y1="364" x2="1392" y2="364" stroke="#e5e7eb" stroke-width="1"/>
    </g>

    <g id="ChartPlaceholder">
      <rect x="48" y="388" width="1344" height="324" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="720" y="540" font-size="14" font-weight="600" fill="#6b7280" text-anchor="middle">Chart panel — @stratchai/cathode</text>
      <text x="720" y="562" font-size="12" fill="#9ca3af" text-anchor="middle">Daily candles · SMA200 overlay · entry/exit markers at 2025-09-25 / 2025-10-01</text>
    </g>

    <g id="RSIPanel">
      <rect x="48" y="724" width="1344" height="64" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="720" y="762" font-size="12" font-weight="500" fill="#6b7280" text-anchor="middle">RSI(14) sub-panel — oversold threshold (32) marked, current 27.21 highlighted</text>
    </g>

    <g id="SignalsGrid">
      <g id="signal_close">
        <text x="48" y="822" font-size="11" font-weight="500" fill="#6b7280">CLOSE</text>
        <text x="48" y="850" font-size="20" font-weight="700" fill="#111827" font-family="JetBrains Mono, monospace">$3,872.63</text>
      </g>
      <g id="signal_rsi">
        <text x="316" y="822" font-size="11" font-weight="500" fill="#6b7280">RSI(14)</text>
        <text x="316" y="850" font-size="20" font-weight="700" fill="#10b981" font-family="JetBrains Mono, monospace">27.21</text>
        <text x="380" y="850" font-size="11" fill="#6b7280">oversold</text>
      </g>
      <g id="signal_mfi">
        <text x="584" y="822" font-size="11" font-weight="500" fill="#6b7280">MFI(14)</text>
        <text x="584" y="850" font-size="20" font-weight="700" fill="#111827" font-family="JetBrains Mono, monospace">32.83</text>
      </g>
      <g id="signal_sma">
        <text x="852" y="822" font-size="11" font-weight="500" fill="#6b7280">SMA(200)</text>
        <text x="852" y="850" font-size="20" font-weight="700" fill="#111827" font-family="JetBrains Mono, monospace">$2,919.89</text>
      </g>
      <g id="signal_dist">
        <text x="1120" y="822" font-size="11" font-weight="500" fill="#6b7280">Δ TO SMA200</text>
        <text x="1120" y="850" font-size="20" font-weight="700" fill="#10b981" font-family="JetBrains Mono, monospace">+32.63%</text>
        <text x="1212" y="850" font-size="11" fill="#6b7280">uptrend</text>
      </g>
    </g>

    <g id="Reasoning">
      <text x="48" y="908" font-size="14" font-weight="700" fill="#111827">Why this is a PASS</text>
      <circle cx="56" cy="932" r="2" fill="#10b981"/>
      <text x="68" y="936" font-size="13" fill="#111827">RSI(14) = 27.21 confirms oversold (&lt; 32).</text>
      <circle cx="56" cy="956" r="2" fill="#10b981"/>
      <text x="68" y="960" font-size="13" fill="#111827">Long-horizon uptrend confirmed (close $3,872.63 &gt; SMA200 $2,919.89).</text>
      <circle cx="56" cy="980" r="2" fill="#10b981"/>
      <text x="68" y="984" font-size="13" fill="#111827">sma_distance 32.63% is in the favorable regime bucket (≥ 5%).</text>
      <circle cx="56" cy="1004" r="2" fill="#10b981"/>
      <text x="68" y="1008" font-size="13" fill="#111827">Setup matches the walk-forward survivor family (n=29 OOS mean +0.71%, win 62% at 1.5% real fees).</text>
    </g>

    <g id="ForwardLook">
      <rect x="48" y="1040" width="660" height="180" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
      <text x="68" y="1068" font-size="12" font-weight="700" fill="#065f46">FORWARD-LOOK — WHAT WOULD HAVE HAPPENED</text>
      <text x="68" y="1100" font-size="13" fill="#111827">Entered  2025-09-25  @ $3,872.63</text>
      <text x="68" y="1122" font-size="13" fill="#111827">Exited   2025-10-01  @ $4,350.03  (PROFIT_FLOOR)</text>
      <text x="68" y="1144" font-size="13" fill="#111827">Hold     6 days</text>
      <text x="68" y="1170" font-size="14" fill="#111827">Gross P&amp;L:  +12.33%</text>
      <text x="68" y="1192" font-size="14" font-weight="700" fill="#10b981">Net P&amp;L (1.5% fees):  +10.83%</text>
    </g>

    <g id="Backtest">
      <rect x="732" y="1040" width="660" height="180" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
      <text x="752" y="1068" font-size="12" font-weight="700" fill="#6b7280">RETROSPECTIVE BACKTEST (PRIOR HISTORY ONLY)</text>
      <text x="752" y="1100" font-size="13" fill="#111827">Entries fired (n):  1</text>
      <text x="752" y="1122" font-size="13" fill="#111827">Win rate:           100.0%</text>
      <text x="752" y="1144" font-size="13" fill="#111827">Mean net P&amp;L:       +3.61%</text>
      <text x="752" y="1166" font-size="13" fill="#111827">Exits:              {TIME_EXIT: 1}</text>
      <text x="752" y="1196" font-size="11" font-style="italic" fill="#6b7280">n=1 is small — single-token retrospective, not predictive.</text>
    </g>
  </g>

  <g id="ActionButtons">
    <rect x="24" y="1284" width="200" height="44" rx="8" fill="#111827"/>
    <text x="124" y="1311" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Download spec JSON</text>
    <rect x="240" y="1284" width="220" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="350" y="1311" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Run backtest on emitted spec</text>
    <rect x="476" y="1284" width="180" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="566" y="1311" font-size="13" font-weight="500" fill="#6b7280" text-anchor="middle">Copy CLI command</text>
  </g>

  <g id="Footer">
    <line x1="0" y1="1352" x2="1440" y2="1352" stroke="#e5e7eb" stroke-width="1"/>
    <text x="24" y="1378" font-size="12" fill="#6b7280">Methodology: 21 archetypes audited, 2 walk-forward survivors. Source: bradyhouse/sigma-swing-agent docs/cmc_evidence_table.md</text>
  </g>

</svg>
